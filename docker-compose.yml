version: '3.8'

services:
  # -----------------------------------
  # 🏛️ Core Databases
  # -----------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: lords-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: lords_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: lords-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lords-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  
    volumes:
      - qdrantdata:/qdrant/storage

      

  # -----------------------------------
  # 🐬 Dolphin Architecture
  # -----------------------------------
  
  api:
    build: 
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: lords-api
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/lords_crm
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_jwt_key_for_development
      - API_PORT=4000
      - GATEWAY_URL=http://lords-bot-gateway:8080
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    command: ["sh", "-c", "cd /app && bun install && bun run --filter api dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: 
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: lords-web
    ports:
      - "4173:4173"
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["sh", "-c", "cd /app && bun install && bun run --filter web dev"]
    depends_on:
      - api

  web-rep:
    build: 
      context: .
      dockerfile: apps/web-rep/Dockerfile.dev
    container_name: lords-web-rep
    ports:
      - "4174:4174"
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["sh", "-c", "cd /app && bun install && bun run --filter web-rep dev"]
    depends_on:
      - api

  workers:
    build: 
      context: .
      dockerfile: apps/workers/Dockerfile.dev
    container_name: lords-workers
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/lords_crm
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
    command: ["sh", "-c", "cd /app && bun install && bun run --filter workers dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  bot-gateway-go:
    build:
      context: .
      dockerfile: apps/bot-gateway-go/Dockerfile
    container_name: lords-bot-gateway
    env_file:
      - .env
    environment:
      - RUST_ENGINE_ADDR=bot-brain-rust:4051
      - REDIS_URL=redis://redis:6379
      - HTTP_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - bot-brain-rust
      - redis
    volumes:
      - gatewaystore:/app/data

  bot-brain-rust:
    build:
      context: .
      dockerfile: apps/bot-brain-rust/Dockerfile
    container_name: lords-bot-brain
    env_file:
      - .env
    environment:
      - QDRANT_GRPC_URL=http://qdrant:6334
      - REDIS_URL=redis://redis:6379
      - OLLAMA_URL=http://host.docker.internal:11434
    ports:
      - "4051:4051"
    depends_on:
      - qdrant
      - redis

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  gatewaystore:
