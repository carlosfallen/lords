version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: imperio-postgres
    environment:
      POSTGRES_USER: imperio
      POSTGRES_PASSWORD: imperio_secret
      POSTGRES_DB: imperio_lord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: imperio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio
    container_name: imperio-minio
    environment:
      MINIO_ROOT_USER: imperio_minio
      MINIO_ROOT_PASSWORD: imperio_minio_secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # Qdrant (Vector DB for bot memory)
  qdrant:
    image: qdrant/qdrant
    container_name: imperio-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
