apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperio-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imperio-workers
  template:
    metadata:
      labels:
        app: imperio-workers
    spec:
      containers:
      - name: imperio-workers
        image: imperio-lord/workers:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: imperio-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: imperio-secrets
              key: REDIS_URL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imperio-bot-bridge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imperio-bot-bridge
  template:
    metadata:
      labels:
        app: imperio-bot-bridge
    spec:
      containers:
      - name: imperio-bot-bridge
        image: imperio-lord/bot-bridge:latest
        ports:
        - containerPort: 4001
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: imperio-secrets
              key: REDIS_URL
        - name: BOT_ENGINE_URL
          value: "http://bot-engine-svc:4051"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: imperio-bot-bridge-svc
spec:
  selector:
    app: imperio-bot-bridge
  ports:
  - protocol: TCP
    port: 80
    targetPort: 4001
  type: ClusterIP
