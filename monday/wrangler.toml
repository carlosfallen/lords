# ═══════════════════════════════════════════════
# wrangler.toml — Cloudflare Workers config
# Deploy: wrangler deploy
# ═══════════════════════════════════════════════

name = "projectflow-api"
main = "worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding  = "DB"
database_name = "projectflow-db"
database_id   = "YOUR_D1_DATABASE_ID"   # wrangler d1 create projectflow-db

[[kv_namespaces]]
binding = "SESSIONS"
id      = "YOUR_KV_NAMESPACE_ID"        # wrangler kv:namespace create SESSIONS

[vars]
JWT_SECRET = "change-me-in-production-use-wrangler-secret"

# Use wrangler secret put JWT_SECRET para produção

---
# ═══════════════════════════════════════════════
# manifest.json — PWA Manifest
# ═══════════════════════════════════════════════
